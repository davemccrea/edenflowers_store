name: Sync Usage Rules

on:
  schedule:
    - cron: "0 9 1,15 * *"
  workflow_dispatch:

jobs:
  sync:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
    steps:
      - uses: actions/checkout@v4
      - uses: erlef/setup-beam@v1
        with:
          version-file: .tool-versions
          version-type: strict
      - uses: actions/cache@v4
        with:
          path: |
            deps
            _build
          key: ${{ runner.os }}-mix-${{ hashFiles('mix.lock') }}
          restore-keys: |
            ${{ runner.os }}-mix-
      - run: mix deps.get
      - run: mix usage_rules.sync --yes
      - name: Open PR if changed
        uses: peter-evans/create-pull-request@v7
        with:
          branch: chore/usage-rules-sync
          commit-message: "chore: sync usage rules"
          title: "chore: sync usage rules"
          body: Automated update of `AGENTS.md` and `.claude/skills/` via `mix usage_rules.sync`.
          delete-branch: true
